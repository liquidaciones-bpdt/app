<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPdT — Asistente de Transporte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; }
        .card-brand {
            background-color: white;
            border-radius: 40px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 25px 50px -12px rgba(241, 245, 249, 0.6);
            padding: 2rem;
            transition: all 0.3s ease;
        }
        .input-brand {
            width: 100%;
            padding: 1rem 1.5rem;
            background-color: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .input-brand:focus {
            outline: none;
            border-color: #E20613;
            box-shadow: 0 0 0 4px rgba(226, 6, 19, 0.1);
        }
        .btn-primary {
            background-color: #E20613;
            color: white;
            padding: 1rem 2rem;
            border-radius: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(226, 6, 19, 0.2);
        }
        .view-hidden { display: none; }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 min-h-screen">

    <div id="loading" class="loading-overlay hidden">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-slate-200 border-t-[#E20613] rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-slate-400 text-xs uppercase tracking-[0.3em]">Procesando</p>
        </div>
    </div>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-2xl border border-white p-2 rounded-[32px] shadow-2xl z-50 flex gap-1">
        <button onclick="switchTab('dashboard')" class="nav-btn p-4 rounded-3xl transition-all" id="nav-dashboard">
            <i data-lucide="layout-grid"></i>
        </button>
        <button onclick="switchTab('units')" class="nav-btn p-4 rounded-3xl transition-all" id="nav-units">
            <i data-lucide="truck"></i>
        </button>
        <button onclick="switchTab('crew')" class="nav-btn p-4 rounded-3xl transition-all" id="nav-crew">
            <i data-lucide="users"></i>
        </button>
        <button onclick="logout()" class="p-4 rounded-3xl text-slate-300 hover:text-red-500 transition-all">
            <i data-lucide="log-out"></i>
        </button>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pt-12 pb-32">
        <header class="flex justify-between items-center mb-12">
            <div>
                <p class="text-[10px] font-black text-[#E20613] uppercase tracking-[0.4em] mb-2">Panel Operativo</p>
                <h1 id="company-name" class="text-3xl font-black tracking-tight text-slate-900">Cargando...</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="user-name" class="font-bold text-slate-900 leading-none">Usuario</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Asistente</p>
                </div>
                <div class="w-14 h-14 bg-white rounded-[22px] shadow-sm border border-slate-100 flex items-center justify-center text-[#E20613]">
                    <i data-lucide="shield-check" size="28"></i>
                </div>
            </div>
        </header>

        <section id="view-dashboard" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="card-brand">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Cumplimiento Unidades</p>
                    <div class="flex items-end gap-2">
                        <span id="stat-units" class="text-4xl font-black text-slate-900">0%</span>
                        <div id="trend-units" class="mb-1 text-[10px] font-bold px-2 py-0.5 rounded-full bg-emerald-50 text-emerald-600">↑ 0%</div>
                    </div>
                </div>
                </div>
            
            <div class="card-brand">
                <div class="flex justify-between items-center mb-8">
                    <h3 class="text-xl font-black text-slate-900">Acciones Urgentes</h3>
                    <button onclick="loadData()" class="p-3 bg-slate-50 rounded-2xl text-slate-400 hover:text-[#E20613] transition-all">
                        <i data-lucide="refresh-cw" size="20"></i>
                    </button>
                </div>
                <div id="pending-docs-list" class="space-y-4">
                    </div>
            </div>
        </section>

        <section id="view-units" class="view-hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">Gestión de Unidades</h2>
                <div class="flex gap-2">
                    <input type="text" placeholder="Buscar placa..." class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:border-[#E20613]">
                </div>
            </div>
            <div id="units-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>

        <section id="view-crew" class="view-hidden space-y-6">
            <h2 class="text-2xl font-black">Personal Operativo</h2>
            <div id="crew-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="modal-upload" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-xl rounded-[40px] shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                <div>
                    <h3 class="text-xl font-black text-slate-900">Actualizar Documento</h3>
                    <p id="upload-target-name" class="text-sm text-slate-500 font-medium">Cargando...</p>
                </div>
                <button onclick="closeUpload()" class="p-2 text-slate-300 hover:text-slate-900 transition-all"><i data-lucide="x"></i></button>
            </div>
            <div class="p-8 space-y-6">
                <div class="space-y-2">
                    <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1">Fecha de Vencimiento</label>
                    <input type="date" id="upload-expiry" class="input-brand">
                </div>
                <div onclick="document.getElementById('file-input').click()" class="p-10 border-2 border-dashed border-slate-100 rounded-[32px] bg-[#F8FAFC] flex flex-col items-center justify-center text-center cursor-pointer group hover:bg-red-50 hover:border-red-100 transition-all">
                    <input type="file" id="file-input" class="hidden" onchange="handleFileSelect(this)">
                    <div id="file-preview-icon" class="p-5 bg-white rounded-3xl text-slate-300 group-hover:text-[#E20613] shadow-sm mb-4"><i data-lucide="upload" size="32"></i></div>
                    <p id="file-name" class="font-bold text-slate-600">Seleccionar o Arrastrar Archivo</p>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mt-2">PDF, JPG o PNG • MAX 10MB</p>
                </div>
            </div>
            <div class="p-8 bg-slate-50 flex gap-4">
                <button onclick="closeUpload()" class="flex-1 py-4 text-slate-500 font-bold hover:text-slate-900 transition-all">Cancelar</button>
                <button onclick="submitUpload()" id="btn-sync-doc" class="flex-[2] btn-primary">Sincronizar Datos</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
