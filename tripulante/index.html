<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HT-BPDT Crew Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* TU DISEÑO INTACTO */
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8FAFC; }
        .view-active { display: flex !important; animation: fadeIn 0.4s ease-out; }
        .view-hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .squircle { border-radius: 2.5rem; }
        .btn-primary { background: #E30613; color: white; border-radius: 1.25rem; font-weight: 700; transition: all 0.3s; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>
    <div id="app-root" class="max-w-[480px] mx-auto min-h-screen relative">
        <div id="loading-overlay" class="hidden fixed inset-0 z-[100] bg-white/80 backdrop-blur-md flex-col items-center justify-center">
            <div class="w-12 h-12 border-4 border-slate-100 border-t-[#E30613] rounded-full animate-spin"></div>
        </div>

        <div id="view-login" class="view-active flex-col p-8 pt-20 space-y-8">
            <div class="space-y-2 text-center">
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">¡Hola de nuevo!</h1>
                <p class="text-slate-500 font-medium">Ingresa a tu panel de tripulante</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="login-dni" placeholder="DNI" class="w-full p-5 bg-white border border-slate-100 squircle shadow-sm focus:border-[#E30613] outline-none transition-all">
                <input type="password" id="login-pass" placeholder="Contraseña" class="w-full p-5 bg-white border border-slate-100 squircle shadow-sm focus:border-[#E30613] outline-none transition-all">
                <button onclick="handleLogin()" class="w-full py-5 btn-primary shadow-xl shadow-red-100">Iniciar Sesión</button>
                <button onclick="switchView('dni-check')" class="w-full text-slate-400 font-bold text-sm py-2">¿No tienes cuenta? Regístrate</button>
            </div>
        </div>

        <div id="view-dni-check" class="view-hidden flex-col p-8 pt-20 space-y-8">
            <button onclick="switchView('login')" class="w-12 h-12 flex items-center justify-center bg-white border border-slate-100 rounded-2xl text-slate-400"><i data-lucide="chevron-left"></i></button>
            <div class="space-y-2">
                <h2 class="text-2xl font-black text-slate-900">Validar Identidad</h2>
                <p class="text-slate-500 font-medium">Verificaremos si estás en nuestra base operativa.</p>
            </div>
            <input type="text" id="check-dni-input" placeholder="Ingresa tu DNI" class="w-full p-5 bg-white border border-slate-100 squircle shadow-sm outline-none">
            <button onclick="handleDniCheck()" class="w-full py-5 btn-primary">Verificar DNI</button>
        </div>

        <div id="view-dashboard" class="view-hidden flex-col pb-24">
            <div class="p-8 bg-white border-b border-slate-50 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-slate-900 rounded-full flex items-center justify-center text-white font-black text-xl shadow-lg" id="avatar-initials">--</div>
                    <div>
                        <p id="dash-user-name" class="font-black text-slate-900 leading-tight">Cargando...</p>
                        <p id="dash-user-cargo" class="text-[10px] font-black text-[#E30613] uppercase tracking-widest mt-1">Cargando...</p>
                    </div>
                </div>
                <button onclick="handleLogout()" class="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400"><i data-lucide="log-out" size="20"></i></button>
            </div>

            <div class="p-8 space-y-8">
                <div class="bg-white p-8 squircle border border-slate-50 shadow-sm flex items-center justify-between">
                    <div class="space-y-1">
                        <p class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em]">Mi Estado</p>
                        <h3 id="dash-compl-label" class="text-lg font-black text-slate-900">ANALIZANDO...</h3>
                    </div>
                    <div class="relative w-24 h-24">
                        <svg class="w-full h-full transform -rotate-90">
                            <circle cx="48" cy="48" r="42" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-100"/>
                            <circle id="dash-compl-circle" cx="48" cy="48" r="42" stroke="#E30613" stroke-width="8" fill="transparent" stroke-dasharray="263.89" stroke-dashoffset="263.89" class="transition-all duration-1000 ease-out"/>
                        </svg>
                        <span id="dash-compl-text" class="absolute inset-0 flex items-center justify-center font-black text-xl text-slate-900">0%</span>
                    </div>
                </div>

                <div class="flex justify-between items-center">
                    <h3 class="font-black text-slate-900 text-lg">Mis Documentos</h3>
                    <button onclick="handleRefresh()" class="p-2 text-[#E30613] font-bold text-sm flex items-center gap-1"><i data-lucide="rotate-cw" size="14"></i> Actualizar</button>
                </div>
                <div id="docs-container" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
