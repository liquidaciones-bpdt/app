<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Validador HT-BPDT</title>
    
    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet">
    
    <!-- LIBRARIES -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary-red: #E30613;
            --primary-amber: #FFB300;
            --primary-green: #00B074;
            --bg-slate: #F8FAFC;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-slate); color: #1E293B; margin: 0; overflow-x: hidden; }

        /* CUSTOM SQUIRCLES & BENTO STYLE */
        .card-brand {
            background-color: white;
            border-radius: 2.5rem;
            border: 1px solid #f1f5f9;
            box-shadow: 0 25px 50px -12px rgba(241, 245, 249, 0.6);
            transition: all 0.3s ease;
        }

        .input-brand {
            width: 100%;
            padding: 1.25rem 1.5rem;
            background-color: #F8FAFC;
            border: 2px solid transparent;
            border-radius: 2rem;
            outline: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .input-brand:focus { border-color: var(--primary-red); background-color: white; }

        .btn-primary {
            background-color: var(--primary-red);
            color: white;
            border-radius: 1.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 20px 40px -10px rgba(227, 6, 19, 0.2);
            transition: all 0.3s ease;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .spinning { animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* VIRTUAL NAVIGATION */
        .view-content { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
        .view-content.active { display: block; opacity: 1; transform: translateY(0); }

        #app-container { display: none; }
        #login-container { display: flex; }
    </style>
</head>
<body>

    <!-- LOADER OVERLAY -->
    <div id="global-loader" class="fixed inset-0 z-[200] bg-white/60 backdrop-blur-sm hidden items-center justify-center">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-slate-200 border-t-[#E30613] rounded-full spinning"></div>
            <p class="font-bold text-slate-500 uppercase tracking-widest text-xs">Procesando solicitud...</p>
        </div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-container" class="fixed inset-0 z-[100] bg-[#F8FAFC] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-[440px] space-y-12">
            <div class="text-center space-y-6">
                <div class="inline-flex items-center justify-center bg-[#E30613] rounded-[48px] shadow-2xl shadow-red-200 text-white" style="width: 94px; height: 97px;">
                    <i data-lucide="shield-check" style="width: 48px; height: 48px; stroke-width: 2.5;"></i>
                </div>
                <div>
                    <h1 class="font-black text-[#101828] tracking-tighter leading-none uppercase text-3xl">Portal Validador</h1>
                    <p class="font-medium text-[#64748b] uppercase tracking-[0.4em] mt-3 text-[10px]">Acceso Administrativo</p>
                </div>
            </div>

            <div class="bg-white rounded-[48px] p-10 shadow-2xl shadow-slate-200 border border-slate-100">
                <form id="login-form" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">DNI del Validador</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" style="width: 18px; height: 18px;"></i>
                            <input id="login-dni" type="text" placeholder="Ingresa tu número" class="input-brand pl-12" required>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1">Contraseña</label>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" style="width: 18px; height: 18px;"></i>
                            <input id="login-pass" type="password" placeholder="••••••••" class="input-brand pl-12" required>
                        </div>
                    </div>
                    <button type="submit" class="w-full btn-primary py-5 text-sm">Validar Credenciales</button>
                </form>
            </div>
            <p class="text-center text-[10px] text-slate-300 font-bold uppercase tracking-[0.3em]">HT-BPDT © 2026</p>
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app-container" class="flex min-h-screen bg-[#F8FAFC]">
        
        <!-- SIDEBAR -->
        <aside class="fixed left-0 top-0 h-full w-[280px] bg-white border-r border-[#f1f5f9] p-8 flex flex-col z-50">
            <div class="flex items-center gap-4 mb-12">
                <div class="p-3 bg-[#E30613] rounded-2xl text-white shadow-lg">
                    <i data-lucide="shield-check" style="width: 24px; height: 24px; stroke-width: 2.5;"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black text-slate-900 leading-tight uppercase tracking-tight">HT-BPDT</h1>
                </div>
            </div>

            <nav class="flex-1 space-y-2" id="sidebar-nav">
                <!-- Tabs generated in script.js -->
            </nav>

            <button id="btn-logout" class="mt-auto w-full flex items-center gap-4 px-6 py-4 rounded-2xl font-bold text-slate-500 hover:bg-red-50 hover:text-[#E30613] transition-all text-sm">
                <i data-lucide="log-out" style="width: 20px; height: 20px;"></i> Cerrar Sesión
            </button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 ml-[280px] p-12 max-w-[1400px]">
            
            <!-- HEADER -->
            <header class="flex justify-between items-center mb-12 py-4 sticky top-0 bg-[#F8FAFC]/80 backdrop-blur-md z-40">
                <div>
                    <h2 id="view-title" class="text-3xl font-black tracking-tighter text-slate-900 uppercase">Dashboard</h2>
                    <p id="view-subtitle" class="text-slate-500 font-medium text-sm">Resumen de cumplimiento de la red.</p>
                </div>
                
                <div class="flex items-center gap-4">
                    <button id="btn-back" class="hidden flex items-center gap-2 px-4 py-2 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-xl">
                        <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Volver
                    </button>
                    <button id="btn-refresh" class="w-12 h-12 bg-white border border-slate-100 rounded-full flex items-center justify-center text-slate-400 hover:text-[#E30613] hover:shadow-xl transition-all">
                        <i data-lucide="rotate-cw" style="width: 20px; height: 20px;"></i>
                    </button>
                    <div class="flex items-center gap-4 pl-4 border-l border-slate-100">
                        <div class="text-right">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Validador</p>
                            <p id="user-display-name" class="font-black text-slate-900 mt-0.5 uppercase text-sm">---</p>
                        </div>
                        <div id="user-avatar" class="w-11 h-11 bg-slate-900 rounded-full border-4 border-white shadow-lg flex items-center justify-center font-black text-white text-base">V</div>
                    </div>
                </div>
            </header>

            <!-- VIEWS -->
            <div id="view-dashboard" class="view-content active space-y-10 pb-20"></div>
            <div id="view-validation" class="view-content space-y-10 pb-20"></div>
            <div id="view-companies" class="view-content space-y-10 pb-20"></div>
            <div id="view-reports" class="view-content space-y-10 pb-20"></div>
            <div id="view-company-detail" class="view-content space-y-10 pb-20"></div>

        </main>
    </div>

    <!-- MODAL -->
    <div id="modal-container" class="fixed inset-0 z-[120] bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-6">
        <div id="modal-content" class="w-full max-w-3xl bg-white rounded-[40px] shadow-2xl p-10 relative max-h-[90vh] flex flex-col overflow-y-auto">
            <!-- Modal dynamic content -->
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
